name: Validar sintaxis de filtros

on:
  push:
    paths:
      - 'minifilters.txt'
  pull_request:
    paths:
      - 'minifilters.txt'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4

      - name: Validar minifilters.txt
        run: |
          ERROR=0
          LINE_NUM=0
          while IFS= read -r line || [ -n "$line" ]; do
            LINE_NUM=$((LINE_NUM + 1))
            if [[ -z "${line// }" ]]; then continue; fi
            if [[ "$line" =~ ^! ]]; then continue; fi
            if [[ "$line" =~ \[.*\]\(.*\) ]]; then
              echo "ERROR: Línea $LINE_NUM contiene enlaces Markdown -> $line"
              ERROR=1
            fi
            if ! [[ "$line" =~ ^(\|\||@@|##|#@#) ]]; then
              echo "ERROR: Línea $LINE_NUM tiene prefijo inválido -> $line"
              ERROR=1
            fi
            if [[ "$line" == *"∣"* ]]; then
              echo "ERROR: Línea $LINE_NUM contiene el carácter inválido '∣' -> $line"
              ERROR=1
            fi
          done < minifilters.txt
          DUPLICATES=$(grep -v '^!' minifilters.txt | grep -v '^$' | sort | uniq -d)
          if [[ -n "$DUPLICATES" ]]; then
            echo "ERROR: Se encontraron reglas duplicadas:"
            echo "$DUPLICATES"
            ERROR=1
          fi
          if [ $ERROR -eq 1 ]; then
            echo "❌ Se encontraron errores en la validación."
            false
          else
            echo "✅ Validación completada exitosamente."
          fi
